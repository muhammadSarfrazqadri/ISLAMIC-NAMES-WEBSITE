<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Find Islamic baby names with meanings in English and Urdu. Search, filter, and explore beautiful Muslim names for boys and girls.">
  <link rel="stylesheet" href="Style.css/namepage.css">
  <link rel="stylesheet" href="Style.css/style.css" />
  <style>
    body {
      font-family: 'Jameel Noori Nastaleeq', 'Segoe UI', sans-serif;

<body>
  <header>

      </div>
    </nav>
    <div class="search-container" style="display:none;"></div>
  </header>
  <div class="container">
    <header>
      <h1 class="animate-on-scroll"></h1>
      <p class="tagline animate-on-scroll"></p>
    </header>
    <section class="info-section">
      <div class="box animate-on-scroll">
        <h2 data-en="Arabic Spelling" data-ur="عربی ہجّہ">عربی ہجّہ</h2>
        <p id="arabic-spelling"></p>
      </div>
      <div class="box animate-on-scroll">
        <h2 data-en="Pronunciation" data-ur="تلفظ">تلفظ</h2>
        <p id="pronunciation"></p>

      <div class="box animate-on-scroll">
        <h2 data-en="Meaning" data-ur="معنی">معنی</h2>
        <p id="meaning"></p>

      <div class="box animate-on-scroll">

        <p id="gender"></p>
      </div>
      <div class="box animate-on-scroll">
        <h2 data-en="Origin" data-ur="اصل">اصل</h2>
        <p id="origin"></p>
      </div>
      <div class="box animate-on-scroll">
        <h2 data-en="Religion" data-ur="مذہب">مذہب</h2>
        <p id="religion"></p>
      </div>
      <div class="box animate-on-scroll">
        <h2 data-en="Mention in Quran or Hadith" data-ur="قرآن یا حدیث میں ذکر">قرآن یا حدیث میں ذکر</h2>
        <p id="quran"></p>
      </div>
      <div class="box animate-on-scroll">
        <h2 data-en="Related / Similar Names" data-ur="متعلقہ / مشابہ نام">متعلقہ / مشابہ نام</h2>
        <p id="related"></p>
      </div>
    </section>
    <div class="button-container">
      <a href="index.html" class="back-btn animate-on-scroll" data-en="← Back to Names List" data-ur="← ناموں کی فہرست پر واپس جائیں">← ناموں کی فہرست پر واپس جائیں</a>

  </div>
